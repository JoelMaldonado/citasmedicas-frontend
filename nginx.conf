server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router usa history mode: cualquier ruta que no sea un archivo real
    # debe caer en index.html para que el router la resuelva en el cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
